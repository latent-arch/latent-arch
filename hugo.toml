baseURL = 'https://latent-arch.com/'
languageCode = 'en-us'
title = 'Latent Arch'
theme = 'PaperMod'

[params]
  author = 'Denis Ilguzin'
  description = 'Software Architect · Engineering Leader · AI Engineering · 20 years in tech'
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  defaultTheme = 'auto'
  disableThemeToggle = false

  [params.assets]
    favicon = '/favicon.ico'
    favicon16x16 = '/favicon-16x16.png'
    favicon32x32 = '/favicon-32x32.png'
    apple_touch_icon = '/apple-touch-icon.png'
    safari_pinned_tab = '/favicon.svg'

  [params.homeInfoParams]
    Title = 'Latent Arch'
    Content = 'Software Architect · Engineering Leader · AI Engineering · 20 years in tech'

  [[params.socialIcons]]
    name = 'linkedin'
    url = 'https://linkedin.com/in/'

[menu]
  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    weight = 10

  [[menu.main]]
    identifier = 'projects'
    name = 'Projects'
    url = '/projects/'
    weight = 20

  [[menu.main]]
    identifier = 'blog'
    name = 'Blog'
    url = '/posts/'
    weight = 30

  [[menu.main]]
    identifier = 'ai-news'
    name = 'AI News'
    url = '/ai-news/'
    weight = 40

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'monokai'
    lineNos = false

[services]
  [services.googleAnalytics]
    ID = 'G-W08SB16PB0'
