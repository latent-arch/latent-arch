<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <radialGradient id="bg-spot" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#243442" />
      <stop offset="60%" stop-color="#141920" />
      <stop offset="100%" stop-color="#080C0E" />
    </radialGradient>
    <radialGradient id="floor-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2C1D18" />
      <stop offset="60%" stop-color="#110B08" />
      <stop offset="100%" stop-color="#050302" />
    </radialGradient>
    
    <!-- Walrus Skin Gradients -->
    <radialGradient id="walrus-body-grad" cx="40%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#8C796B" />
      <stop offset="50%" stop-color="#68594D" />
      <stop offset="90%" stop-color="#3C2A20" />
      <stop offset="100%" stop-color="#2B1D16" />
    </radialGradient>
    <radialGradient id="walrus-head-grad" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#9C897A" />
      <stop offset="70%" stop-color="#6B5C4F" />
      <stop offset="100%" stop-color="#46362B" />
    </radialGradient>
    <radialGradient id="muzzle-grad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#BCAAA0" />
      <stop offset="80%" stop-color="#927E74" />
      <stop offset="100%" stop-color="#736056" />
    </radialGradient>
    
    <!-- Cello Gradients -->
    <linearGradient id="cello-wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E86E20" />
      <stop offset="30%" stop-color="#C54807" />
      <stop offset="70%" stop-color="#842602" />
      <stop offset="100%" stop-color="#340B00" />
    </linearGradient>
    <linearGradient id="cello-ribs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#631700" />
      <stop offset="100%" stop-color="#210500" />
    </linearGradient>
    <linearGradient id="fingerboard-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111" />
      <stop offset="30%" stop-color="#333" />
      <stop offset="80%" stop-color="#111" />
      <stop offset="100%" stop-color="#000" />
    </linearGradient>
    
    <!-- Tusk Gradient -->
    <linearGradient id="tusk-grad" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" stop-color="#FFF9F0" />
      <stop offset="40%" stop-color="#EADDCA" />
      <stop offset="80%" stop-color="#C5B19A" />
      <stop offset="100%" stop-color="#8C7764" />
    </linearGradient>

    <!-- Filters -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="tusk-shadow" x="-50%" y="-20%" width="200%" height="150%">
      <feDropShadow dx="-2" dy="8" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background Room & Stage -->
  <rect width="800" height="800" fill="url(#bg-spot)" />
  <ellipse cx="400" cy="740" rx="360" ry="70" fill="url(#floor-grad)" />
  <ellipse cx="400" cy="740" rx="280" ry="40" fill="#0A0605" opacity="0.6" />

  <!-- Walrus Body Underneath & Behind -->
  <g id="walrus-base">
    <!-- Back Right Flipper -->
    <path d="M 500,680 C 600,690 710,730 670,750 C 630,770 560,710 520,680 Z" fill="url(#walrus-body-grad)" />
    <!-- Back Left Flipper -->
    <path d="M 300,680 C 200,690 90,730 130,750 C 170,770 240,710 280,680 Z" fill="url(#walrus-body-grad)" />
    
    <!-- Main Body Bulge -->
    <path d="M 400,280 C 580,280 660,400 620,580 C 580,740 220,740 180,580 C 140,400 220,280 400,280 Z" fill="url(#walrus-body-grad)" />
    
    <!-- Skin Folds / Creases -->
    <path d="M 280,630 C 350,670 450,670 520,630" fill="none" stroke="#2B1D16" stroke-width="8" stroke-linecap="round" opacity="0.6" />
    <path d="M 260,570 C 350,620 470,620 560,560" fill="none" stroke="#2B1D16" stroke-width="6" stroke-linecap="round" opacity="0.5" />
    <path d="M 320,480 C 370,510 440,510 490,470" fill="none" stroke="#2B1D16" stroke-width="5" stroke-linecap="round" opacity="0.4" />
  </g>

  <!-- Left Front Flipper (Holding Neck) behind cello body but wrapping over neck -->
  <path d="M 180,480 C 150,380 230,220 300,180 C 330,160 360,170 350,200 C 340,240 260,400 240,490 Z" fill="url(#walrus-body-grad)" filter="url(#drop-shadow)" />

  <!-- Cello Assembly -->
  <!-- Local Origin: (420, 500), tilted -15 degrees. Rests dynamically against walrus. -->
  <g id="cello" transform="translate(420, 490) rotate(-15)" filter="url(#drop-shadow)">
    
    <!-- Endpin -->
    <rect x="-3" y="160" width="6" height="120" fill="#AAAAAA" />
    <polygon points="-3,160 3,160 0,110" fill="#222" />
    <circle cx="0" cy="280" r="5" fill="#111" />
    
    <!-- Cello Body Ribs (3D Wall) -->
    <path d="M 12,-140 L 27,-140 C 57,-140 82,-110 82,-80 C 82,-60 72,-40 67,-30 C 52,-20 52,20 67,30 C 72,40 102,60 102,100 C 102,140 72,170 12,170 C -48,170 -78,140 -78,100 C -78,60 -48,40 -43,-30 C -28,20 -28,-20 -43,-30 C -48,-40 -58,-60 -58,-80 C -58,-110 -33,-140 -3,-140 Z" fill="url(#cello-ribs)" stroke="#110300" stroke-width="2"/>
    
    <!-- Cello Back/Sides Shadow Divider -->
    <path d="M 0,-140 L 15,-140 C 45,-140 70,-110 70,-80 C 70,-60 60,-40 55,-30 C 40,-20 40,20 55,30 C 60,40 90,60 90,100 C 90,140 60,170 0,170 C -60,170 -90,140 -90,100 C -90,60 -60,40 -55,30 C -40,20 -40,-20 -55,-30 C -60,-40 -70,-60 -70,-80 C -70,-110 -45,-140 -15,-140 Z" fill="#000" opacity="0.3" transform="scale(1.02)"/>

    <!-- Main Cello Body Front -->
    <path id="cello-top" d="M 0,-140 L 15,-140 C 45,-140 70,-110 70,-80 C 70,-60 60,-40 55,-30 C 40,-20 40,20 55,30 C 60,40 90,60 90,100 C 90,140 60,170 0,170 C -60,170 -90,140 -90,100 C -90,60 -60,40 -55,30 C -40,20 -40,-20 -55,-30 C -60,-40 -70,-60 -70,-80 C -70,-110 -45,-140 -15,-140 Z" fill="url(#cello-wood)" stroke="#150500" stroke-width="3" />
    
    <!-- Cello Purfling & Edge Highlight -->
    <path d="M 0,-135 L 13,-135 C 41,-135 65,-106 65,-80 C 65,-61 56,-43 51,-33 C 35,-23 35,23 51,33 C 56,43 85,61 85,100 C 85,135 58,165 0,165 C -58,165 -85,135 -85,100 C -85,61 -56,43 -51,33 C -35,23 -35,-23 -51,-33 C -56,-43 -65,-61 -65,-80 C -65,-106 -41,-135 -13,-135 Z" fill="none" stroke="#FFA266" stroke-width="1.5" opacity="0.4" />
    <path d="M 0,-137 L 14,-137 C 43,-137 68,-108 68,-80 C 68,-62 58,-42 53,-32 C 38,-22 38,22 53,32 C 58,42 88,62 88,100 C 88,137 59,167 0,167 C -59,167 -88,137 -88,100 C -88,62 -58,42 -53,32 C -38,22 -38,-22 -53,-32 C -58,-42 -68,-62 -68,-80 C -68,-108 -43,-137 -14,-137 Z" fill="none" stroke="#220B00" stroke-width="2" />
    
    <!-- F-Holes -->
    <!-- Right F-hole -->
    <g fill="#1A0A02">
      <!-- Upper & Lower dots -->
      <circle cx="28" cy="-26" r="3.5" />
      <circle cx="28" cy="46" r="3.5" />
      <!-- Central Slash -->
      <path d="M 27,-25 C 22,-15 22,0 24,10 L 21,12 L 24,14 C 25,25 23,35 27,45 C 30,35 26,25 26,15 L 29,13 L 26,11 C 24,0 26,-15 29,-25 Z" />
    </g>
    <!-- Left F-hole (mirrored) -->
    <g fill="#1A0A02">
      <circle cx="-28" cy="-26" r="3.5" />
      <circle cx="-28" cy="46" r="3.5" />
      <path d="M -27,-25 C -22,-15 -22,0 -24,10 L -21,12 L -24,14 C -25,25 -23,35 -27,45 C -30,35 -26,25 -26,15 L -29,13 L -26,11 C -24,0 -26,-15 -29,-25 Z" />
    </g>

    <!-- Neck Back Wood -->
    <path d="M -8,-140 L 8,-140 L 8,-310 L -8,-310 Z" fill="#6A270B" />
    
    <!-- Pegbox Front Base -->
    <path d="M -8,-290 L 8,-290 L 6,-335 L -6,-335 Z" fill="#3D1201" />

    <!-- Scroll -->
    <path d="M -6,-335 L 6,-335 C 15,-345 20,-355 12,-365 C 5,-372 -5,-372 -12,-365 C -20,-355 -15,-345 -6,-335 Z" fill="#501A03" />
    <!-- Scroll inner volute line -->
    <path d="M -2,-340 C 8,-350 10,-355 5,-360 C 0,-363 -5,-360 -2,-355" fill="none" stroke="#2B0C00" stroke-width="2" stroke-linecap="round" />

    <!-- Pegs (Sticking Out) -->
    <g fill="#150803">
      <polygon points="-8,-292 -24,-295 -26,-290 -24,-285 -8,-288" />
      <polygon points="8,-302 24,-305 26,-300 24,-295 8,-298" />
      <polygon points="-7,-312 -23,-315 -25,-310 -23,-305 -7,-308" />
      <polygon points="7,-322 23,-325 25,-320 23,-315 7,-318" />
    </g>

    <!-- Fingerboard -->
    <path d="M -12,-30 L 12,-30 L 8,-290 C 0,-295 0,-295 -8,-290 Z" fill="url(#fingerboard-grad)" filter="url(#drop-shadow)" />

    <!-- Tailpiece -->
    <path d="M -10,40 C -8,45 -3,140 0,165 C 3,140 8,45 10,40 Z" fill="#130C07" filter="url(#drop-shadow)" />
    <!-- Fine tuners -->
    <circle cx="-6" cy="43" r="1.5" fill="#CCC" />
    <circle cx="-2" cy="43" r="1.5" fill="#CCC" />
    <circle cx="2" cy="43" r="1.5" fill="#CCC" />
    <circle cx="6" cy="43" r="1.5" fill="#CCC" />

    <!-- Bridge -->
    <path d="M -16,20 L -12,2 C -5,-1 5,-1 12,2 L 16,20 C 5,18 -5,18 -16,20 Z" fill="#EAD3B3" filter="url(#drop-shadow)" />
    <!-- Bridge cutouts -->
    <circle cx="0" cy="12" r="2.5" fill="#1A0A02" />
    <path d="M -8,12 L -5,15 L -6,8 Z" fill="#1A0A02" />
    <path d="M 8,12 L 5,15 L 6,8 Z" fill="#1A0A02" />

    <!-- Strings -->
    <!-- C String -->
    <polyline points="-4.5,43 -4.5,1.5 -3.5,-290" stroke="#DDDDDD" stroke-width="1.8" fill="none" opacity="0.9" />
    <!-- G String -->
    <polyline points="-1.5,43 -1.5,1.0 -1.2,-300" stroke="#E2DDCD" stroke-width="1.4" fill="none" opacity="0.9" />
    <!-- D String -->
    <polyline points="1.5,43 1.5,1.0 1.2,-310" stroke="#EAE6D8" stroke-width="1.0" fill="none" opacity="0.9" />
    <!-- A String -->
    <polyline points="4.5,43 4.5,1.5 3.5,-320" stroke="#F4F4F0" stroke-width="0.7" fill="none" opacity="0.9" />

  </g>

  <!-- Flipper fingers wrapped around cello neck -->
  <path d="M 315,185 C 330,175 345,185 330,200" fill="none" stroke="#4A3A2F" stroke-width="6" stroke-linecap="round" />
  <path d="M 310,205 C 325,195 340,205 325,220" fill="none" stroke="#4A3A2F" stroke-width="6" stroke-linecap="round" />
  <path d="M 305,225 C 320,215 335,225 320,240" fill="none" stroke="#4A3A2F" stroke-width="6" stroke-linecap="round" />

  <!-- Walrus Head & Tusks & Whiskers Layered Carefully -->
  <g id="walrus-head-group">
    
    <!-- Base Head Bulge/Forehead -->
    <path d="M 420,130 C 500,130 550,190 530,290 C 510,360 330,360 310,290 C 290,190 340,130 420,130 Z" fill="url(#walrus-head-grad)" filter="url(#drop-shadow)" />

    <!-- Dynamic Skin Folds on Forehead -->
    <path d="M 380,150 Q 420,160 460,150" fill="none" stroke="#46362B" stroke-width="4" stroke-linecap="round" />
    <path d="M 390,165 Q 420,175 450,165" fill="none" stroke="#46362B" stroke-width="4" stroke-linecap="round" />

    <!-- Left Tusk -->
    <path d="M 360,250 C 350,380 290,440 280,480 C 310,430 380,350 380,250 Z" fill="url(#tusk-grad)" filter="url(#tusk-shadow)" />
    <!-- Tusk Texture Striae -->
    <path d="M 355,280 Q 365,285 375,280" fill="none" stroke="#8C7764" stroke-width="2" opacity="0.4" />
    <path d="M 345,340 Q 355,345 365,335" fill="none" stroke="#8C7764" stroke-width="2" opacity="0.4" />
    <path d="M 320,410 Q 330,415 340,400" fill="none" stroke="#8C7764" stroke-width="2" opacity="0.4" />

    <!-- Right Tusk -->
    <path d="M 480,250 C 490,380 550,440 560,480 C 530,430 460,350 460,250 Z" fill="url(#tusk-grad)" filter="url(#tusk-shadow)" />
    <!-- Right Tusk Striae -->
    <path d="M 465,280 Q 475,285 485,280" fill="none" stroke="#8C7764" stroke-width="2" opacity="0.4" />
    <path d="M 475,335 Q 485,345 495,340" fill="none" stroke="#8C7764" stroke-width="2" opacity="0.4" />
    <path d="M 500,400 Q 510,415 520,410" fill="none" stroke="#8C7764" stroke-width="2" opacity="0.4" />

    <!-- Muzzle / Cheeks -->
    <g filter="url(#drop-shadow)">
      <ellipse cx="370" cy="240" rx="55" ry="45" fill="url(#muzzle-grad)" />
      <ellipse cx="470" cy="240" rx="55" ry="45" fill="url(#muzzle-grad)" />
    </g>

    <!-- Nose -->
    <path d="M 405,195 Q 420,190 435,195 Q 450,210 420,230 Q 390,210 405,195 Z" fill="#1C1511" />
    <!-- Nose Specular Highlight -->
    <ellipse cx="415" cy="200" rx="8" ry="3" fill="#FFF" opacity="0.3" transform="rotate(-15 415 200)" />

    <!-- Eyes (Closed, rapt in music) -->
    <path d="M 355,180 Q 370,188 385,180" fill="none" stroke="#111" stroke-width="5" stroke-linecap="round" />
    <path d="M 455,180 Q 470,188 485,180" fill="none" stroke="#111" stroke-width="5" stroke-linecap="round" />
    <path d="M 355,160 Q 370,150 385,160" fill="none" stroke="#3A2A20" stroke-width="6" stroke-linecap="round" />
    <path d="M 455,160 Q 470,150 485,160" fill="none" stroke="#3A2A20" stroke-width="6" stroke-linecap="round" />

    <!-- Whiskers -->
    <!-- Left Side Whiskers -->
    <g stroke="#FDFBF7" stroke-linecap="round" fill="none">
      <path d="M 370,230 Q 280,220 220,250" stroke-width="3" />
      <path d="M 360,240 Q 260,240 200,280" stroke-width="4" />
      <path d="M 350,250 Q 250,260 210,310" stroke-width="3.5" />
      <path d="M 345,260 Q 250,280 220,340" stroke-width="4" />
      <path d="M 350,270 Q 270,300 240,370" stroke-width="3" />
      <path d="M 365,220 Q 300,200 250,220" stroke-width="2.5" />
      <!-- Small pores -->
      <circle cx="360" cy="235" r="1.5" fill="#4A3A2F" stroke="none" />
      <circle cx="350" cy="245" r="1.5" fill="#4A3A2F" stroke="none" />
      <circle cx="345" cy="255" r="1.5" fill="#4A3A2F" stroke="none" />
      <circle cx="355" cy="265" r="1.5" fill="#4A3A2F" stroke="none" />
    </g>
    <!-- Right Side Whiskers -->
    <g stroke="#FDFBF7" stroke-linecap="round" fill="none">
      <path d="M 470,230 Q 560,220 620,250" stroke-width="3" />
      <path d="M 480,240 Q 580,240 640,280" stroke-width="4" />
      <path d="M 490,250 Q 590,260 630,310" stroke-width="3.5" />
      <path d="M 495,260 Q 590,280 620,340" stroke-width="4" />
      <path d="M 490,270 Q 570,300 600,370" stroke-width="3" />
      <path d="M 475,220 Q 540,200 590,220" stroke-width="2.5" />
      <!-- Small pores -->
      <circle cx="480" cy="235" r="1.5" fill="#4A3A2F" stroke="none" />
      <circle cx="490" cy="245" r="1.5" fill="#4A3A2F" stroke="none" />
      <circle cx="495" cy="255" r="1.5" fill="#4A3A2F" stroke="none" />
      <circle cx="485" cy="265" r="1.5" fill="#4A3A2F" stroke="none" />
    </g>
  </g>

  <!-- The Bow (Positioned across the strings at an angle) -->
  <g id="bow" transform="translate(410, 485) rotate(-10)" filter="url(#drop-shadow)">
    <!-- Wooden Stick -->
    <polyline points="-160,-5 160,-5" stroke="#7A3911" stroke-width="6" stroke-linecap="round" />
    
    <!-- Hair -->
    <polyline points="-155,8 150,8" stroke="#F9F9F4" stroke-width="5" />
    
    <!-- Tip -->
    <path d="M -155,-7 L -168,-7 C -172,0 -172,8 -165,10 L -155,8 Z" fill="#E8DBC5" />
    <!-- Small tip accent -->
    <polygon points="-165,10 -163,12 -155,8" fill="#111" />
    
    <!-- Frog (Held by Right Flipper) -->
    <rect x="145" y="-6" width="18" height="20" rx="3" fill="#1C1815" />
    <!-- Pearl dot in frog -->
    <circle cx="154" cy="4" r="2" fill="#E5E0D8" />
    <!-- End screw -->
    <path d="M 163,-4 L 170,-4 C 172,-4 172,2 170,2 L 163,2 Z" fill="#D4D4D4" />
  </g>

  <!-- Right Front Flipper (Bowing hand) -->
  <path d="M 680,600 C 720,490 620,410 570,430 C 550,440 540,460 550,480 C 560,500 580,520 590,610 Z" fill="url(#walrus-body-grad)" filter="url(#drop-shadow)" />
  
  <!-- Fingers holding the bow frog -->
  <path d="M 545,465 C 530,470 540,485 550,490" fill="none" stroke="#46362B" stroke-width="6" stroke-linecap="round" />
  <path d="M 555,480 C 540,485 550,500 560,505" fill="none" stroke="#46362B" stroke-width="6" stroke-linecap="round" />

</svg>