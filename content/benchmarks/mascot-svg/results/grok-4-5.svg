<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#e6f7ff"/>
  
  <!-- Cello body (curved, upright on endpin) -->
  <ellipse cx="220" cy="240" rx="50" ry="90" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
  <!-- Cello waist curves -->
  <path d="M170 200 Q220 220 270 200" fill="none" stroke="#5D3A1A" stroke-width="3"/>
  <path d="M170 280 Q220 260 270 280" fill="none" stroke="#5D3A1A" stroke-width="3"/>
  <!-- Cello top and bottom rounding -->
  <ellipse cx="220" cy="160" rx="40" ry="25" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
  <ellipse cx="220" cy="320" rx="35" ry="20" fill="#8B4513" stroke="#5D3A1A" stroke-width="2"/>
  
  <!-- f-holes -->
  <path d="M195 200 Q190 230 195 260 Q200 230 195 200" fill="none" stroke="#2F1A0A" stroke-width="3"/>
  <path d="M245 200 Q250 230 245 260 Q240 230 245 200" fill="none" stroke="#2F1A0A" stroke-width="3"/>
  
  <!-- Bridge -->
  <rect x="210" y="230" width="20" height="8" fill="#DEB887" stroke="#5D3A1A" stroke-width="1"/>
  
  <!-- Four strings -->
  <line x1="215" y1="140" x2="215" y2="320" stroke="#F5F5DC" stroke-width="1.5"/>
  <line x1="220" y1="140" x2="220" y2="320" stroke="#F5F5DC" stroke-width="1.5"/>
  <line x1="225" y1="140" x2="225" y2="320" stroke="#F5F5DC" stroke-width="1.5"/>
  <line x1="230" y1="140" x2="230" y2="320" stroke="#F5F5DC" stroke-width="1.5"/>
  
  <!-- Neck and scroll -->
  <rect x="210" y="80" width="20" height="70" fill="#8B4513" stroke="#5D3A1A" stroke-width="1"/>
  <ellipse cx="220" cy="70" rx="15" ry="12" fill="#8B4513" stroke="#5D3A1A" stroke-width="1"/>
  <!-- Tuning pegs -->
  <circle cx="205" cy="75" r="3" fill="#DEB887"/>
  <circle cx="205" cy="90" r="3" fill="#DEB887"/>
  <circle cx="235" cy="75" r="3" fill="#DEB887"/>
  <circle cx="235" cy="90" r="3" fill="#DEB887"/>
  
  <!-- Endpin -->
  <line x1="220" y1="340" x2="220" y2="370" stroke="#C0C0C0" stroke-width="3"/>
  <circle cx="220" cy="372" r="4" fill="#C0C0C0"/>
  
  <!-- Walrus body -->
  <ellipse cx="120" cy="220" rx="70" ry="55" fill="#708090" stroke="#2F4F4F" stroke-width="2"/>
  
  <!-- Walrus head -->
  <ellipse cx="100" cy="150" rx="45" ry="40" fill="#708090" stroke="#2F4F4F" stroke-width="2"/>
  
  <!-- Snout -->
  <ellipse cx="70" cy="160" rx="25" ry="20" fill="#778899" stroke="#2F4F4F" stroke-width="1"/>
  
  <!-- Two long tusks -->
  <path d="M60 170 Q55 220 65 260" fill="none" stroke="#FFFAF0" stroke-width="8" stroke-linecap="round"/>
  <path d="M80 170 Q85 220 75 260" fill="none" stroke="#FFFAF0" stroke-width="8" stroke-linecap="round"/>
  <!-- Tusk highlights -->
  <path d="M60 170 Q55 220 65 260" fill="none" stroke="#E8E0D0" stroke-width="3" stroke-linecap="round"/>
  <path d="M80 170 Q85 220 75 260" fill="none" stroke="#E8E0D0" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Whiskers (visible) -->
  <line x1="50" y1="155" x2="20" y2="145" stroke="#4A4A4A" stroke-width="1.5"/>
  <line x1="50" y1="160" x2="15" y2="160" stroke="#4A4A4A" stroke-width="1.5"/>
  <line x1="50" y1="165" x2="20" y2="175" stroke="#4A4A4A" stroke-width="1.5"/>
  <line x1="55" y1="150" x2="25" y2="135" stroke="#4A4A4A" stroke-width="1.5"/>
  <line x1="55" y1="170" x2="25" y2="185" stroke="#4A4A4A" stroke-width="1.5"/>
  <!-- Right side whiskers -->
  <line x1="90" y1="155" x2="110" y2="140" stroke="#4A4A4A" stroke-width="1.5"/>
  <line x1="90" y1="165" x2="115" y2="170" stroke="#4A4A4A" stroke-width="1.5"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="140" r="6" fill="#1C1C1C"/>
  <circle cx="105" cy="138" r="6" fill="#1C1C1C"/>
  <circle cx="86" cy="138" r="2" fill="white"/>
  <circle cx="106" cy="136" r="2" fill="white"/>
  
  <!-- Flippers -->
  <!-- Left flipper (holding neck area / supporting) -->
  <ellipse cx="160" cy="180" rx="25" ry="12" fill="#696969" stroke="#2F4F4F" stroke-width="1" transform="rotate(-30 160 180)"/>
  
  <!-- Right flipper drawing the bow -->
  <ellipse cx="170" cy="230" rx="30" ry="14" fill="#696969" stroke="#2F4F4F" stroke-width="1" transform="rotate(20 170 230)"/>
  
  <!-- Bow being drawn across strings -->
  <line x1="150" y1="210" x2="280" y2="250" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
  <!-- Bow hair -->
  <line x1="155" y1="215" x2="275" y2="252" stroke="#F5F5DC" stroke-width="2" stroke-linecap="round"/>
  <!-- Bow frog/handle -->
  <rect x="145" y="205" width="12" height="10" rx="2" fill="#654321"/>
  
  <!-- Rear flippers -->
  <ellipse cx="160" cy="270" rx="20" ry="10" fill="#696969" stroke="#2F4F4F" stroke-width="1" transform="rotate(40 160 270)"/>
  <ellipse cx="90" cy="270" rx="18" ry="9" fill="#696969" stroke="#2F4F4F" stroke-width="1" transform="rotate(-20 90 270)"/>
  
  <!-- Small detail: cello tailpiece -->
  <path d="M210 300 L230 300 L225 320 L215 320 Z" fill="#DEB887" stroke="#5D3A1A" stroke-width="1"/>
</svg>