# Прогон бенчмарк-задачи «маскот»: конфиг моделей → OpenRouter → SVG + results.json → коммит → деплой.
# Запуск руками (workflow_dispatch) при выходе новой модели; вход model — перегенерить одну модель.
# Требует секрет OPENROUTER_API_KEY (уже добавлен для ai-news).
name: Benchmark mascot

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'id модели из scripts/benchmark-models.json (пусто = все)'
        required: false
        default: ''
  # ВРЕМЕННО: триггер для запусков из sandbox без API-токена. Убрать после отладки.
  # (изменение этого файла = запуск прогона недостающих моделей; тик: открытые модели)
  push:
    paths:
      - '.github/workflows/benchmark-mascot.yml'

permissions:
  contents: write   # push результатов
  actions: write    # запуск deploy.yml (push от GITHUB_TOKEN сам не триггерит workflows)

concurrency:
  group: benchmark-mascot
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # Страховка от зависшего вызова модели: висящий джоб блокирует очередь (concurrency)
    timeout-minutes: 30
    steps:
      # ref: main явно — «Re-run» старого запуска иначе чекаутит старый SHA,
      # и джоб перегенерирует уже опубликованные результаты, а пуш отклоняется
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Сгенерировать результаты
        run: |
          set -o pipefail
          MODEL_ARG=""
          if [ -n "${{ github.event.inputs.model }}" ]; then
            MODEL_ARG="--model ${{ github.event.inputs.model }}"
          fi
          node scripts/generate-benchmark-mascot.mjs $MODEL_ARG 2>&1 | tee /tmp/bench.log
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      # ВРЕМЕННО: коммит лога прогона, чтобы читать ошибки из sandbox без доступа к логам Actions.
      # Убрать вместе с push-триггером после отладки (паттерн ai-news).
      - name: Закоммитить лог прогона
        if: always()
        run: |
          git config user.name "Benchmark Bot"
          git config user.email "actions@github.com"
          tail -c 4000 /tmp/bench.log > benchmark-last-run.log
          git add benchmark-last-run.log
          git diff --cached --quiet || { git commit -m "ci: benchmark-mascot — лог прогона (временно, удалить)"; git pull --rebase origin main; git push; }

      - name: Закоммитить результаты
        id: commit
        # always: частичные результаты (сгенерённые до падения/отмены/таймаута) не должны теряться —
        # так уже дважды пропадали готовые SVG
        if: always()
        run: |
          git config user.name "Benchmark Bot"
          git config user.email "actions@github.com"
          git add content/benchmarks/
          if git diff --cached --quiet; then
            echo "Изменений нет — пропуск"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "benchmarks: mascot-svg — прогон $(date -u +%F)"
          # пока джоб работал, main мог уехать (например, коммит ai-news) — иначе push отклонится
          git pull --rebase origin main
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Запустить деплой
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
